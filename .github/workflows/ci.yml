name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        # vectors (lancedb) runs CPU-only in tests with a fake embedder; the model-backed
        # eval suite is `-m local` and stays deselected here.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp,vectors]"

      - name: Import check (public API)
        run: python -c "from memoryhub import Hub, load_config, load_profile"

      - name: Schema export
        run: hub schema export --stdout > /dev/null

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests
        run: pytest --cov=memoryhub --cov-report=term-missing
